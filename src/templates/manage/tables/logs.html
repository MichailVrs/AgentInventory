<table class="table table-striped table-condensed">
    <thead>
        <tr>
            <th>важность</th>
            <th>файл</th>
            <th>строка</th>
            <th>сообщение</th>
            <th>время</th>
            <th>версия</th>
        </tr>
    </thead>

    <tbody>
        {% for log in logs %}

        <tr>
            <td>{{ log.severity }}</td>
            <td>{{ log.filename }}</td>
            <td>{{ log.line }}</td>
            <td>{{ log.message }}</td>
            <td>{{ log.created }}</td>
            <td>{{ log.version }}</td>
        </tr>

        {% endfor %}
    </tbody>

</table>
