                <table class="table table-striped table-condensed">
                    <thead>
                        <tr>
                            <th>Пакет</th>
                            <th>Платформа</th>
                            <th>Версия</th>
                            <th>Описание</th>
                            <th>Охват (%)</th>
                            <th>Запросы</th>
                            <th>Метки</th>
                        </tr>
                    </thead>

                    <tbody>
                        {% for pack in packs %}

                        <tr>
                            <td>
                                <a href="{{ url_for('manage.packs', _anchor=pack.name) }}">{{ pack.name }}</a>
                            </td>
                            <td>{{ pack.platform or 'все' }}</td>
                            <td>{{ pack.version or '' }}</td>
                            <td>{{ pack.description or '' }}</td>
                            <td>{{ pack.shard ~ '%' if pack.shard else '' }}</td>
                            <td>{{ pack.queries | count }}</td>
                            <td>
                                <select multiple class="tagsinput" data-uri="{{ url_for('manage.tag_pack', pack_name=pack.name) }}"{% if not loop.index0 %} placeholder="Введите метку"{% endif %}>
                                    {% for tag in pack.tags | sort(attribute='value') %}
                                    <option value="{{ tag.value }}">{{ tag.value }}</option>
                                    {% endfor %}
                                </select>
                            </td>
                        </tr>

                        {% endfor %}
                    </tbody>

                </table>
