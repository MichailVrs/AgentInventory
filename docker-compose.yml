name: inventory_py3
services:
  proxy:
    image: inventory-nginx
    ports:
      - "4444:4443"
      - "8081:8080"
    volumes:
      - ./staks/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./staks/ssl/certs:/certs:ro
    depends_on:
      - server
  server:
    image: inventory-python
    build: ./docker/python
    command: ["/venv/bin/python", "manage.py", "run", "-h", "0.0.0.0"]
    volumes:
      - ./src:/src
    environment:
      TZ: Europe/Moscow
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONPATH: /src
      SECRET_KEY: ${SECRET_KEY:-super-secret-production-key-change-me}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: ${POSTGRESQL_DATABASE}
      POSTGRES_USER: ${POSTGRESQL_USER}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
      DEBUG: False
      DEBUG_TB_ENABLED: False
      ASSETS_DEBUG: False
      REDIS_HOST: broker
      ENROLL_SECRET: ${ENROLL_SECRET}
      FLASK_DEBUG: 0
      FLASK_APP: manage.py
    depends_on:
      broker:
        condition: service_started
      db:
        condition: service_healthy
  worker:
    image: inventory-python
    build: ./docker/python
    command: ["/venv/bin/celery", "-A", "worker:celery", "worker", "-l", "INFO"]
    volumes:
      - ./src:/src
    environment:
      PYTHONDONTWRITEBYTECODE: 1
      PYTHONPATH: /src
      SECRET_KEY: ${SECRET_KEY:-super-secret-production-key-change-me}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: ${POSTGRESQL_DATABASE}
      POSTGRES_USER: ${POSTGRESQL_USER}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
      DEBUG: False
      ASSETS_DEBUG: False
      REDIS_HOST: broker
      FLASK_DEBUG: 0
      FLASK_APP: manage.py
    depends_on:
      broker:
        condition: service_started
      db:
        condition: service_healthy
  broker:
    image: inventory-redis
    volumes:
      - ./docker/redis.conf:/etc/redis.conf
      - broker_data_py3:/var/lib/redis/data
    command: redis-server --protected-mode no --appendonly yes
  db:
    image: inventory-postgresql
    restart: always
    shm_size: 128mb
    volumes:
      - db_data_py3:/var/lib/pgsql/data
    environment:
      POSTGRESQL_DATABASE: ${POSTGRESQL_DATABASE}
      POSTGRESQL_USER: ${POSTGRESQL_USER}
      POSTGRESQL_PASSWORD: ${POSTGRESQL_PASSWORD}
      TZ: "Europe/Moscow"
    # ports:
    #   - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USER} -d ${POSTGRESQL_DATABASE}"]
      interval: 5s   
      timeout: 5s    
      retries: 5     
      start_period: 10s
  agent:
    image: inventory-osquery
    build: ./docker/osquery
    command: ["--flagfile", "/etc/osquery.flags"]
    volumes:
      - ./staks/osquery/osquery.flags:/etc/osquery.flags
      - ./staks/ssl/certs/certificate.crt:/ssl/certificate.crt:ro
      - /data
    depends_on:
      - proxy
    environment:
      - ENROLL_SECRET=${ENROLL_SECRET}
volumes:
  broker_data_py3:
  db_data_py3:
  agent_data_py3: