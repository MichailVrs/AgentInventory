events {
    worker_connections 1024;
}

http {
    # Перенаправляем все HTTP запросы на HTTPS (опционально, но рекомендуется)
    server {
        listen 8080;
        server_name localhost;
        return 301 https://$host:4443$request_uri;
    }

    server {
        listen 4443 ssl;
        server_name localhost;

        # Пути к сертификатам внутри контейнера
        ssl_certificate     /certs/certificate.crt;
        ssl_certificate_key /certs/certificate.key;

        # Настройки SSL для совместимости с современными браузерами (TLS 1.2+)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Логи для отладки
        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        location = /favicon.ico {
            access_log off;
            log_not_found off;
            empty_gif;
        }

        location / {
            # Имя 'app' должно совпадать с именем сервиса в docker-compose.yml
            proxy_pass http://server:5000;
            
            # Важные заголовки для корректной работы Flask/Django и JWT
            proxy_set_header Host localhost:4444;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Port 4444; 

            # Увеличение таймаутов, если обработка логов занимает время
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}